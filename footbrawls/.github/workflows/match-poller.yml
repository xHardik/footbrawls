name: Match Poller
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: # lets you trigger it manually too

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Ping match poller
        run: |
          curl -X POST https://footbrawls.vercel.app/api/cron/match-poller \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          --fail \
          --silent